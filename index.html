<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知媒體 - 嘟比的作品集</title>
    <style>
        :root {
            /* 柔和的莫蘭迪綠與灰藍漸層，營造純淨感 */
            --bg-color: linear-gradient(-45deg, #A3B18A, #DDA15E, #5D8AA8, #8FB996);
            --card-bg: rgba(255, 255, 255, 0.7); 
            --text-color: #2D3E4E;
            --accent-color: #4A7C59;
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        [data-theme="dark"] {
            --bg-color: linear-gradient(-45deg, #283618, #606C38, #2D3E4E, #1A1A1A);
            --card-bg: rgba(0, 0, 0, 0.6);
            --text-color: #F0F0F0;
            --accent-color: #8FB996;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-color);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow-y: auto;
            padding: 60px 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主題切換按鈕 */
        .theme-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 個人簡介卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 50px 30px;
            text-align: center;
            color: var(--text-color);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            width: 90%;
            max-width: 420px;
            margin-bottom: 60px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .intro-text {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* 行動按鈕 */
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: var(--accent-color);
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(74, 124, 89, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(74, 124, 89, 0.4);
        }

        /* 影片作品區 */
        .video-container {
            width: 90%;
            max-width: 700px;
        }

        .video-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 40px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .video-item p {
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--text-color);
            letter-spacing: 1px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .video-item p::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 10px;
        }

        video {
            width: 100%;
            border-radius: 20px;
            display: block;
            background: #000;
            outline: none;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" id="btnText">切換至深色</button>

    <div class="glass-card">
        <div class="avatar">✨</div>
        <h1>知媒體</h1>
        <div class="intro-text">
            你好，我是 <strong>嘟比</strong>。<br>
            專注於捕捉生活的純淨與美感。<br>
            歡迎瀏覽我的保養品影像作品。
        </div>
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="btn" target="_blank">造訪頻道</a>
    </div>

    <div class="video-container">
        <div class="video-item">
            <p>純粹之美 No.1</p>
            <video autoplay loop muted playsinline controls>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>光澤儀式 No.2</p>
            <video autoplay loop muted playsinline controls>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>水潤肌密 No.3</p>
            <video autoplay loop muted playsinline controls>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>逆時呵護 No.4</p>
            <video autoplay loop muted playsinline controls>
                <source src="嘟可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>植物力量 No.5</p>
            <video autoplay loop muted playsinline controls>
                <source src="嘟可樂3.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('btnText');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '切換至深色';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '切換至淺色';
            }
        }
    </script>

</body>
</html>
