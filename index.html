<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知媒體 - 嘟比的作品集</title>
    <style>
        :root {
            /* 調整背景漸層，讓顏色稍微深一點點 */
            --bg-color: linear-gradient(-45deg, #5D8AA8, #8FB996, #A3B18A, #5D8AA8);
            /* 提高卡片背景的不透明度 (0.2 -> 0.6)，文字會更清晰 */
            --card-bg: rgba(255, 255, 255, 0.6); 
            --text-color: #222222; /* 深灰色字體 */
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-color: linear-gradient(-45deg, #BC6C25, #DDA15E, #283618, #BC6C25);
            --card-bg: rgba(0, 0, 0, 0.5);
            --text-color: #f0f0f0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.8s ease, transform 0.3s ease;
        }

        body {
            min-height: 100vh;
            height: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-color);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow-y: auto; 
            padding: 40px 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color); /* 按鈕文字也隨主題變化 */
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
            font-weight: bold;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            color: var(--text-color);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
            margin-bottom: 50px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { 
            font-weight: 600; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            /* 加入微弱文字陰影增加辨識度 */
            text-shadow: 0 1px 2px rgba(255,255,255,0.5); 
        }
        
        [data-theme="dark"] h1 { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        p { font-weight: 400; line-height: 1.6; margin-bottom: 20px; }

        .btn {
            display: block;
            text-decoration: none;
            color: white; /* 按鈕內的字保持白色 */
            background: #4A7C59; /* 給按鈕一個顯眼的底色 */
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #355E42;
            transform: scale(1.05);
        }

        .video-container {
            width: 90%;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .video-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .video-item p {
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-color);
        }

        video {
            width: 100%;
            border-radius: 10px;
            display: block;
            background: #000; /* 影片載入前顯示黑色底 */
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" id="btnText">切換至深色</button>

    <div class="glass-card">
        <div class="avatar">✨</div>
        <h1>知媒體</h1>
        <p>你好!我是嘟比。<br>歡迎常上來看我的作品</p>
        <img src="photo1.jpg" alt="嘟比的照片" style="width:100%; max-width:200px; border-radius:10px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="btn" target="_blank">我的影音頻道</a>
    </div>

    <div class="video-container">
        <div class="video-item">
            <p>作品 No.1</p>
            <video autoplay loop muted playsinline>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>作品 No.2</p>
            <video autoplay loop muted playsinline>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>作品 No.3</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>作品 No.4</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>作品 No.5</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂3.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('btnText');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '切換至深色';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '切換至淺色';
            }
        }
    </script>

</body>
</html>
