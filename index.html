<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi's Daily | 嘟比的生活紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --milktea-bg: #F2E9E1;   
            --milkpowder-pink: #F8D7D7; 
            --accent-pink: #E8A8A8;  
            --text-brown: #6A5445;   /* 加深一點焦糖棕，更清晰 */
            --card-white: rgba(255, 255, 255, 0.9);
            --soft-shadow: 0 10px 30px rgba(118, 99, 87, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--milktea-bg);
            background-image: radial-gradient(at 0% 0%, var(--milkpowder-pink) 0, transparent 40%),
                              radial-gradient(at 100% 100%, var(--milkpowder-pink) 0, transparent 40%);
            color: var(--text-brown);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        .hero {
            width: 100%; max-width: 500px;
            padding: 80px 25px 30px;
            text-align: center;
        }

        .avatar-wrap {
            width: 280px; height: 280px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 10px solid #FFF;
            box-shadow: var(--soft-shadow);
            overflow: hidden;
            background: #EEE;
        }

        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* 🔥 核心修正：確保嘟比二字絕對等大且平衡 🔥 */
        .dobi-title-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* 精準控制字距 */
            margin-bottom: 20px;
        }

        .dobi-char {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-brown);
            /* 使用圓體風格的系統字體優先，確保平衡 */
            font-family: "Hiragino Maru Gothic ProN", "Quicksand", "Meiryo", "Microsoft JhengHei", sans-serif;
            line-height: 1;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 15px rgba(232, 168, 168, 0.4);
        }

        .intro {
            font-size: 1rem; line-height: 1.8;
            padding: 0 15px; margin-bottom: 35px;
            font-weight: 300;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .hero { padding-top: 50px; }
            .avatar-wrap { width: 240px; height: 240px; }
            .dobi-char { font-size: 3rem; }
            .intro { font-size: 0.95rem; }
        }

        /* 影片清單 */
        .video-list { width: 95%; max-width: 600px; }

        .video-card {
            background: var(--card-white);
            border-radius: 35px;
            padding: 15px;
            margin-bottom: 40px;
            box-shadow: var(--soft-shadow);
            position: relative;
            backdrop-filter: blur(8px);
        }

        .video-title {
            font-size: 1.05rem; margin: 10px 0 15px 10px;
            font-weight: 500; display: flex; align-items: center;
        }

        .video-title::before {
            content: "♡"; margin-right: 8px; color: var(--accent-pink);
            font-weight: bold;
        }

        video {
            width: 100%; border-radius: 25px;
            display: block; background: #000;
        }

        .mute-toggle {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.85);
            border: none; width: 42px; height: 42px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .cta-btn {
            display: inline-block;
            background: var(--accent-pink); color: #FFF;
            padding: 15px 50px; border-radius: 50px;
            text-decoration: none; font-weight: 500;
            box-shadow: 0 8px 20px rgba(232, 168, 168, 0.4);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="avatar-wrap">
            <img src="photo1.jpg" alt="Dobi">
        </div>
        
        <div class="dobi-title-wrap">
            <span class="dobi-char">嘟</span>
            <span class="dobi-char">比</span>
        </div>

        <p class="intro">
            捕捉每一份溫柔時刻。<br>
            這裏紀錄了雲朵小狗的調皮日常，<br>
            願這份美好也能治癒你的心。
        </p>
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="cta-btn" target="_blank">進入嘟比頻道</a>
    </section>

    <div class="video-list">
        <div class="video-card">
            <p class="video-title">我想喝可樂的瞬間</p>
            <video id="v1" autoplay loop muted playsinline>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v1', this)">🔇</button>
        </div>

        <div class="video-card">
            <p class="video-title">可樂在哪裡</p>
            <video id="v2" autoplay loop muted playsinline>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v2', this)">🔇</button>
        </div>

        <div class="video-card">
            <p class="video-title">可樂向前衝</p>
            <video id="v3" autoplay loop muted playsinline>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v3', this)">🔇</button>
        </div>

        <div class="video-card">
            <p class="video-title">嘟比也愛可樂</p>
            <video id="v4" autoplay loop muted playsinline>
                <source src="嘟可樂2.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v4', this)">🔇</button>
        </div>

        <div class="video-card">
            <p class="video-title">跟我一起奔跑吧</p>
            <video id="v5" autoplay loop muted playsinline>
                <source src="嘟可樂3.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v5', this)">🔇</button>
        </div>
    </div>

    <script>
        function toggleMute(videoId, btn) {
            const video = document.getElementById(videoId);
            video.muted = !video.muted;
            btn.innerHTML = video.muted ? "🔇" : "🔊";
        }
    </script>
</body>
</html>
