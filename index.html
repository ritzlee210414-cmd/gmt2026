<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知媒體 - 嘟比的作品集</title>
    <style>
        :root {
            --bg-color: linear-gradient(-45deg, #669BBC, #ADC178, #DDE5B6, #669BBC);
            --card-bg: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        [data-theme="dark"] {
            --bg-color: linear-gradient(-45deg, #BC6C25, #DDA15E, #283618, #BC6C25);
            --card-bg: rgba(0, 0, 0, 0.4);
            --text-color: #e0e0e0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.8s ease, transform 0.3s ease;
        }

        body {
            /* 修正：將 overflow 改為 auto，並讓高度隨內容增長 */
            min-height: 100vh;
            height: auto; 
            display: flex;
            flex-direction: column; /* 讓內容垂直排列 */
            align-items: center;
            background: var(--bg-color);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'PingFang TC', sans-serif;
            overflow-y: auto; 
            padding: 40px 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .theme-btn {
            position: fixed; /* 改為固定在右上角 */
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            color: var(--text-color);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            margin-bottom: 50px; /* 與下方影片區隔開 */
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 { font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; }
        p { font-weight: 300; opacity: 0.8; margin-bottom: 20px; }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .btn:hover {
            background: white;
            color: #333;
            transform: scale(1.05);
        }

        /* 影片區排版 */
        .video-container {
            width: 90%;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .video-item {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .video-item p {
            margin-bottom: 10px;
            font-weight: 500;
        }

        video {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" id="btnText">切換至深色</button>

    <div class="glass-card">
        <div class="avatar">✨</div>
        <h1>知媒體</h1>
        <p>你好!我是嘟比。<br>歡迎常上來看我的作品</p>
        <img src="photo1.jpg" style="width:100%; max-width:200px; border-radius:10px; margin-bottom: 20px;">
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="btn" target="_blank">我的作品</a>
    </div>

    <div class="video-container">
        <div class="video-item">
            <p>No1</p>
            <video autoplay loop muted playsinline>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>No2</p>
            <video autoplay loop muted playsinline>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>No3</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>No4</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-item">
            <p>No5</p>
            <video autoplay loop muted playsinline>
                <source src="嘟可樂3.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('btnText');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '切換至深色';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '切換至淺色';
            }
        }
    </script>

</body>
</html>
