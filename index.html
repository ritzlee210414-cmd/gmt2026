<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi | The Art of Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nude-bg: #F8F5F2;    /* 高級裸色 */
            --milk-tea: #D6C5B5;   /* 焦糖奶茶 */
            --soft-pink: #FCEEEE;  /* 霧粉色 */
            --deep-text: #4A443F;  /* 深咖啡 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--nude-bg);
            color: var(--deep-text);
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 0.05em;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 封面區塊：極簡雜誌感 */
        .hero {
            width: 100%; max-width: 600px;
            padding: 60px 20px;
            text-align: center;
            animation: fadeIn 1.5s ease;
        }

        .photo-frame {
            width: 85%; max-width: 320px;
            aspect-ratio: 4/5; /* 雜誌人像比例 */
            margin: 0 auto 40px;
            border-radius: 100px 100px 20px 20px; /* 獨特的弧線設計 */
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            background: #FFF;
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 頂級設計師的字體處理：不再糾結粗細，改用間距與韻律 */
        .name-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .name-main {
            font-family: 'Ma Shan Zheng', cursive; /* 充滿藝術感的手寫字 */
            font-size: 4.5rem;
            color: var(--deep-text);
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }

        .name-bg-blur {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; color: var(--soft-pink);
            z-index: 1; filter: blur(4px); opacity: 0.5;
            white-space: nowrap;
        }

        .intro-text {
            font-size: 0.95rem; line-height: 2;
            color: var(--milk-tea); font-weight: 300;
            margin-bottom: 40px;
            padding: 0 40px;
        }

        /* 影片區域：去邊框化 */
        .feed { width: 90%; max-width: 500px; }

        .video-box {
            background: #FFF;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(214, 197, 181, 0.2);
            position: relative;
        }

        .video-box p {
            font-size: 0.85rem; padding: 10px 0 15px 5px;
            color: var(--milk-tea); letter-spacing: 0.2em;
            text-align: left; text-transform: uppercase;
        }

        video { 
            width: 100%; border-radius: 16px; 
            display: block; 
        }

        /* 極簡音量按鈕 */
        .sound-btn {
            position: absolute; bottom: 25px; right: 25px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            border: none; width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
            color: var(--deep-text); font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手機版適配 */
        @media (max-width: 480px) {
            .name-main { font-size: 3.5rem; }
            .intro-text { padding: 0 20px; font-size: 0.85rem; }
            .hero { padding-top: 40px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="photo-frame">
            <img src="photo1.jpg" alt="Dobi's Portrait">
        </div>
        
        <div class="name-container">
            <div class="name-bg-blur">Dobi</div>
            <h1 class="name-main">嘟比</h1>
        </div>

        <p class="intro-text">
            Capturing the soft moments.<br>
            在奶油色的時光裡，紀錄雲朵小狗的優雅與調皮。<br>
            願這份純粹，能治癒你的日常。
        </p>
    </section>

    <div class="feed">
        <div class="video-box">
            <p>01 / Gentle Moment</p>
            <video id="v1" autoplay loop muted playsinline>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
            <button class="sound-btn" onclick="tm('v1', this)">🔇</button>
        </div>

        <div class="video-box">
            <p>02 / Playful Soul</p>
            <video id="v2" autoplay loop muted playsinline>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
            <button class="sound-btn" onclick="tm('v2', this)">🔇</button>
        </div>

        <div class="video-box">
            <p>03 / Dreamy Run</p>
            <video id="v3" autoplay loop muted playsinline>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
            <button class="sound-btn" onclick="tm('v3', this)">🔇</button>
        </div>

        <div class="video-box">
            <p>04 / Sweet Dobi</p>
            <video id="v4" autoplay loop muted playsinline>
                <source src="嘟可樂2.mp4" type="video/mp4">
            </video>
            <button class="sound-btn" onclick="tm('v4', this)">🔇</button>
        </div>

        <div class="video-box">
            <p>05
