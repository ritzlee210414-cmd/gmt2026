<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi's Diary | 嘟比生活紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF7F2;
            --accent-color: #E8A8A8;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #6D5D55;
            --soft-shadow: 0 15px 35px rgba(109, 93, 85, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #3D3935;
            --accent-color: #D4A373;
            --card-bg: rgba(61, 57, 53, 0.9);
            --text-color: #EDE7E1;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* 增加質感背景光暈 */
        body::before {
            content: "";
            position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(232,168,168,0.15) 0%, transparent 70%);
            z-index: -1;
        }

        /* 主題切換 */
        .theme-btn {
            position: absolute; top: 20px; right: 20px;
            background: var(--card-bg); border: none;
            padding: 8px 15px; border-radius: 50px;
            cursor: pointer; box-shadow: var(--soft-shadow);
            font-size: 12px; z-index: 100;
        }

        /* 封面區塊 */
        .hero {
            width: 100%; max-width: 500px;
            padding: 120px 20px 40px;
            text-align: center;
        }

        .avatar-wrap {
            width: 280px; height: 280px; /* 稍微微調確保手機顯示 */
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 10px solid #FFF;
            box-shadow: var(--soft-shadow);
            overflow: hidden;
            background: #EEE;
        }

        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* 討喜的字體設計 */
        .dobi-name {
            font-family: 'ZCOOL KuaiLe', cursive; /* 圓潤手寫感 */
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .badge {
            font-size: 12px; letter-spacing: 2px;
            text-transform: uppercase; opacity: 0.6;
            margin-bottom: 20px; display: block;
        }

        /* 手機版文案優化 */
        .intro {
            font-size: 1rem; line-height: 1.8;
            padding: 0 15px; margin-bottom: 30px;
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .hero { padding-top: 80px; }
            .avatar-wrap { width: 220px; height: 220px; }
            .dobi-name { font-size: 2.5rem; }
            .intro { font-size: 0.95rem; }
            .intro br { display: none; } /* 手機端自動換行，強制換行反而亂 */
            .intro span::after { content: " "; } /* 補空格 */
        }

        /* 影片控制區 */
        .video-list { width: 95%; max-width: 600px; }

        .video-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: var(--soft-shadow);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .video-title {
            font-size: 1.1rem; margin-bottom: 15px;
            display: flex; align-items: center; font-weight: 500;
        }

        video {
            width: 100%; border-radius: 25px;
            display: block; background: #000;
        }

        /* 獨立的音量按鈕 */
        .mute-toggle {
            position: absolute; bottom: 35px; right: 35px;
            background: rgba(255,255,255,0.7);
            border: none; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 10;
        }

        .cta-btn {
            display: inline-block;
            background: var(--accent-color); color: #FFF;
            padding: 15px 40px; border-radius: 50px;
            text-decoration: none; font-weight: 500;
            box-shadow: 0 10px 20px rgba(232, 168, 168, 0.3);
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Dark Mode</button>

    <section class="hero">
        <div class="avatar-wrap">
            <img src="photo1.jpg" alt="Dobi">
        </div>
        <span class="badge">Happy Bichon Frisé</span>
        <h1 class="dobi-name">嘟比 Dobi</h1>
        <p class="intro">
            這裡紀錄了 <span>雲朵小狗嘟比的調皮日常</span>。
            <span>不管是懶洋洋地曬太陽</span>，還是 <span>開心地在草地奔跑</span>，
            <span>每個瞬間都想跟你分享</span>。
        </p>
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="cta-btn" target="_blank">跟我去冒險</a>
    </section>

    <div class="video-list">
        <div class="video-card">
            <p class="video-title">🐾 快樂的追逐</p>
            <video id="v1" autoplay loop muted playsinline>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v1', this)">🔇</button>
        </div>

        <div class="video-card">
            <p class="video-title">🐾 點心在哪裡</p>
            <video id="v2" autoplay loop muted playsinline>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
            <button class="mute-toggle" onclick="toggleMute('v2', this)">🔇</button>
        </div>
        
        </div>

    <script>
        // 靜音切換功能
        function toggleMute(videoId, btn) {
            const video = document.getElementById(videoId);
            video.muted = !video.muted;
            btn.innerHTML = video.muted ? "🔇" : "🔊";
        }

        function toggleTheme() {
            const body = document.documentElement;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? '' : 'dark');
            document.getElementById('themeBtn').innerText = isDark ? 'Dark Mode' : 'Light Mode';
        }
    </script>
</body>
</html>
