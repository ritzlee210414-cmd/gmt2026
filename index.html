<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi's Life | 嘟比熊搗蛋記</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --milktea-bg: #F5EFE6;      /* 暖奶茶底色 */
            --milkpowder-pink: #FCE7E7; /* 溫柔奶粉色 */
            --accent-pink: #E8A8A8;     /* 質感乾燥粉 */
            --text-caramel: #5C4B40;    /* 深焦糖咖啡色 */
            --card-white: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--milktea-bg);
            background-image: linear-gradient(180deg, var(--milkpowder-pink) 0%, var(--milktea-bg) 40%);
            color: var(--text-caramel);
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 60px;
        }

        /* 封面區：恢復經典大圓形 */
        .hero {
            width: 100%; max-width: 500px;
            padding: 80px 20px 40px;
            text-align: center;
        }

        .avatar-circle {
            width: 300px; height: 300px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 8px solid #FFF;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            overflow: hidden;
            background: #FFF;
        }

        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* 核心修正：穩定圓體、絕對等大、呼吸字距 */
        .dobi-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-caramel);
            letter-spacing: 12px; 
            margin-left: 12px;    
            margin-bottom: 20px;
            font-family: "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
        }

        .intro {
            font-size: 1rem; line-height: 1.8;
            padding: 0 15px; margin-bottom: 35px;
            font-weight: 300; opacity: 0.9;
        }

        /* YouTube 作品連通按鍵 */
        .cta-button {
            display: inline-block;
            background-color: var(--accent-pink);
            color: #FFF;
            padding: 15px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(232, 168, 168, 0.4);
            transition: all 0.3s ease;
        }

        .cta-button:active { transform: scale(0.95); }

        /* 影片 Feed 區 */
        .video-feed { width: 92%; max-width: 600px; margin-top: 20px; }

        .video-card {
            background: var(--card-white);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(92, 75, 64, 0.05);
            position: relative;
        }

        .video-info {
            font-size: 1rem; font-weight: 500;
            margin: 5px 0 15px 10px;
            display: flex; align-items: center;
        }

        .video-info::before {
            content: "♥"; margin-right: 10px; color: var(--accent-pink);
        }

        video { width: 100%; border-radius: 20px; display: block; background: #000; }

        /* 聲音開關 ICON */
        .mute-btn {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.8);
            border: none; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; z-index: 10;
        }

        @media (max-width: 480px) {
            .avatar-circle { width
