<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比熊嘟比的比奇堡 - 嘟比的生活紀錄</title>
    <style>
        :root {
            --bg-color: #FFDE59; /* 活潑黃 */
            --accent-color: #FF914D; /* 活力橘 */
            --card-bg: #FFFFFF;
            --text-color: #545454;
            --secondary-color: #5CE1E6; /* 清新藍 */
        }

        [data-theme="dark"] {
            --bg-color: #2C3E50;
            --accent-color: #FFBD59;
            --card-bg: #34495E;
            --text-color: #ECF0F1;
            --secondary-color: #3498DB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--accent-color) 1px, transparent 1px);
            background-size: 30px 30px; /* 俏皮點點背景 */
            font-family: 'Comic Sans MS', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        /* 切換主題按鈕 */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 3px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            color: var(--text-color);
        }

        /* 封面卡片 */
        .profile-card {
            background: var(--card-bg);
            border: 5px solid var(--accent-color);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 10px 10px 0px var(--text-color); /* 復古插畫感陰影 */
            margin-bottom: 50px;
            position: relative;
        }

        .avatar-container {
            width: 180px;
            height: 180px;
            margin: -80px auto 20px; /* 讓頭像往上飄一點 */
            border: 8px solid white;
            border-radius: 50%;
            overflow: hidden;
            background: #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff;
        }

        .badge {
            background: var(--secondary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .intro {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border: 3px solid var(--text-color);
        }

        .btn:hover {
            transform: rotate(-3deg) scale(1.1);
            background: #FF5733;
        }

        /* 影片區 */
        .video-grid {
            width: 90%;
            max-width: 600px;
        }

        .video-card {
            background: white;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 35px;
            border: 3px solid var(--text-color);
            box-shadow: 8px 8px 0px var(--secondary-color);
        }

        .video-card p {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
            color: var(--text-color);
        }

        video {
            width: 100%;
            border-radius: 20px;
            background: #000;
        }

        /* 裝飾小圖案 */
        .paw-print {
            position: absolute;
            font-size: 30px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" id="btnText">🌙 切換風格</button>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="photo1.jpg" alt="比熊嘟比 Dobi">
        </div>
        <div class="badge">☁️ 雲朵系男孩</div>
        <h1>我是嘟比！</h1>
        <p class="intro">
            歡迎來到我的冒險頻道！🐾<br>
            我是一隻喜歡吃可樂果（？）、愛散步、<br>
            更愛在泥土裡打滾的比熊犬。
        </p>
        <a href="https://www.youtube.com/watch?v=ZTSlByHLMzk" class="btn" target="_blank">看更多我的影音 🎬</a>
    </div>

    <div class="video-grid">
        <div class="video-card">
            <p>🐾 嘟比冒險記 No.1</p>
            <video autoplay loop muted playsinline controls>
                <source src="洪可樂1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-card">
            <p>🎾 球球在哪裡？ No.2</p>
            <video autoplay loop muted playsinline controls>
                <source src="洪可樂2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-card">
            <p>💤 睡覺也要萌萌噠 No.3</p>
            <video autoplay loop muted playsinline controls>
                <source src="嘟可樂1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('btnText');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '🌙 切換深色';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ 切換淺色';
            }
        }
    </script>
</body>
</html>
